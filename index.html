<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Field</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e; /* Dim, dark blue background */
        }

        /* The Green Field */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to bottom, #2d5a27, #1e3f1a);
            z-index: 1;
        }

        .flower {
            position: absolute;
            transform: translate(-50%, -50%) scale(0);
            animation: bloom 1s ease-out forwards;
            z-index: 2;
        }

        /* Blooming Animation */
        @keyframes bloom {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); }
            60% { transform: translate(-50%, -50%) scale(1.2) rotate(45deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(15deg); }
        }

        .petal {
            position: absolute;
            background: #ff69b4;
            width: 20px;
            height: 35px;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .center {
            position: absolute;
            background: #ffd700;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="field"></div>

    <script>
        document.addEventListener('click', (e) => {
            createFlower(e.clientX, e.clientY);
        });

        function createFlower(x, y) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.style.left = x + 'px';
            flower.style.top = y + 'px';

            // Randomize color slightly
            const colors = ['#ff69b4', '#ffb6c1', '#f08080', '#e6e6fa', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            // Create 5 petals
            for (let i = 0; i < 5; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.background = randomColor;
                petal.style.transform = `translate(-50%, -50%) rotate(${i * 72}deg) translateY(-15px)`;
                flower.appendChild(petal);
            }

            // Add center
            const center = document.createElement('div');
            center.className = 'center';
            flower.appendChild(center);

            document.body.appendChild(flower);

            // Cleanup after a while to keep it light
            setTimeout(() => {
                if (document.body.contains(flower)) {
                    flower.style.opacity = '0';
                    flower.style.transition = 'opacity 2s';
                    setTimeout(() => flower.remove(), 2000);
                }
            }, 10000);
        }
    </script>
</body>
</html>
