<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Flower Field</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #05050a 100%);
        }

        /* The Green Field - Flowers only grow here now */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #1e3f1a, #0a140a);
            z-index: 5;
            cursor: pointer;
            border-top: 2px solid #2d5a27;
        }

        /* The Stem */
        .stem {
            position: absolute;
            width: 4px;
            background: #2d5a27;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 0;
            animation: grow-stem 0.6s ease-out forwards;
        }

        @keyframes grow-stem {
            to { height: 60px; }
        }

        /* The Flower Head */
        .flower-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: bloom 0.5s 0.6s ease-out forwards;
        }

        @keyframes bloom {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 25px;
            border-radius: 50%;
            transform-origin: bottom center;
        }

        .center {
            position: absolute;
            background: #ffd700;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
        }

        /* Fireflies */
        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffffaa;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffaa;
            animation: drift linear infinite, flicker 3s ease-in-out infinite;
        }

        @keyframes drift {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-100vh) translateX(30px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="field" id="grassField"></div>

    <script>
        const field = document.getElementById('grassField');

        field.addEventListener('click', (e) => {
            // Get click position relative to the field
            const rect = field.getBoundingClientRect();
            const x = e.clientX;
            const y = e.clientY;

            createFlower(x, y);
        });

        function createFlower(x, y) {
            const container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.left = x + 'px';
            container.style.top = y + 'px';
            container.style.zIndex = '10';

            // Create the stem
            const stem = document.createElement('div');
            stem.className = 'stem';

            // Create the flower head (petals + center)
            const flowerHead = document.createElement('div');
            flowerHead.className = 'flower-head';

            const colors = ['#ff85a1', '#fbb1bd', '#9b5de5', '#fee440', '#00f5d4'];
            const petalColor = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 5; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.background = petalColor;
                petal.style.transform = `translate(-50%, -100%) rotate(${i * 72}deg)`;
                flowerHead.appendChild(petal);
            }

            const center = document.createElement('div');
            center.className = 'center';
            flowerHead.appendChild(center);

            stem.appendChild(flowerHead);
            container.appendChild(stem);
            document.body.appendChild(container);
        }

        // Initialize Fireflies
        for (let i = 0; i < 25; i++) {
            const f = document.createElement('div');
            f.className = 'firefly';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.top = Math.random() * 100 + 'vh';
            f.style.animationDuration = (Math.random() * 15 + 10) + 's, ' + (Math.random() * 4 + 2) + 's';
            document.body.appendChild(f);
        }
    </script>
</body>
</html>

            }, 10000);
        }
    </script>
</body>
</html>
