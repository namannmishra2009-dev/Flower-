<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jhansi's Magical Garden</title>
    <style>
        :root {
            --bg-color: #050505;
            --moon-color: #fffde0;
            --flower-blue: #7dd3fc;
            --leaf-blue: #1e3a8a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: none;
            font-family: 'Georgia', serif;
        }

        /* Stars Background */
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background: transparent;
            z-index: 0;
        }

        /* The Moon with "Jhansi" */
        .moon {
            position: absolute;
            top: 10%; right: 10%;
            width: 100px; height: 100px;
            background: var(--moon-color);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(255, 253, 224, 0.4);
            z-index: 2;
        }

        .moon-text {
            color: #444;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* Grass Field */
        .field {
            position: absolute;
            bottom: 0; width: 100%; height: 35%;
            background: linear-gradient(to bottom, #0a1a0a, #000);
            z-index: 10;
            cursor: pointer;
        }

        /* Flower SVG Styling */
        .flower-svg {
            position: absolute;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 8px rgba(125, 211, 252, 0.6));
            animation: sway 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* Growth Animation for SVG Paths */
        .grow-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: grow-animate 2.5s ease-out forwards;
        }

        @keyframes grow-animate {
            to { stroke-dashoffset: 0; }
        }

        .bloom-petal {
            transform: scale(0);
            transform-origin: center;
            animation: petal-appear 1s 1.8s ease-out forwards;
        }

        @keyframes petal-appear {
            to { transform: scale(1); }
        }

        /* Fireflies */
        .firefly {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            z-index: 5;
            pointer-events: none;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>
    <div class="moon"><div class="moon-text">Jhansi</div></div>
    <div class="field" id="grassField"></div>

    <script>
        const field = document.getElementById('grassField');

        function createFlower(x, y) {
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            
            // Randomly scale height for variation
            const h = 150 + Math.random() * 100;
            svg.setAttribute("viewBox", `0 0 100 ${h}`);
            svg.setAttribute("width", "100");
            svg.setAttribute("height", h);
            svg.classList.add("flower-svg");
            
            svg.style.left = (x - 50) + "px";
            svg.style.top = (y - h) + "px";

            // Main Stem
            const stem = document.createElementNS(svgNS, "path");
            stem.setAttribute("d", `M50,${h} Q${40 + Math.random()*20},${h/2} 50,30`);
            stem.setAttribute("stroke", "#2d5a27");
            stem.setAttribute("stroke-width", "3");
            stem.setAttribute("fill", "none");
            stem.classList.add("grow-path");
            svg.appendChild(stem);

            // Petals (The "Glow" look)
            const petalsGroup = document.createElementNS(svgNS, "g");
            petalsGroup.classList.add("bloom-petal");
            
            const colors = ['#7dd3fc', '#e0f2fe', '#bae6fd'];
            const petalColor = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 5; i++) {
                const petal = document.createElementNS(svgNS, "ellipse");
                petal.setAttribute("cx", "50");
                petal.setAttribute("cy", "20");
                petal.setAttribute("rx", "12");
                petal.setAttribute("ry", "20");
                petal.setAttribute("fill", petalColor);
                petal.setAttribute("transform", `rotate(${i * 72}, 50, 30)`);
                petal.style.opacity = "0.8";
                petalsGroup.appendChild(petal);
            }

            // Flower Center
            const center = document.createElementNS(svgNS, "circle");
            center.setAttribute("cx", "50");
            center.setAttribute("cy", "30");
            center.setAttribute("r", "5");
            center.setAttribute("fill", "#ffd700");
            petalsGroup.appendChild(center);

            svg.appendChild(petalsGroup);
            document.body.appendChild(svg);
        }

        // Interaction Handling
        function handle(e) {
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            createFlower(clientX, clientY);
        }

        field.addEventListener('mousedown', handle);
        field.addEventListener('touchstart', handle, {passive: false});

        // Add Stars
        const starContainer = document.getElementById('starField');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '1px';
            star.style.height = '1px';
            star.style.background = 'white';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            starContainer.appendChild(star);
        }
    </script>
</body>
</html>
