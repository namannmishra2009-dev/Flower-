<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Blooming Field</title>
    <style>
        :root {
            --night-sky: radial-gradient(circle at 50% 100%, #1e2a44 0%, #050912 100%);
            --grass-color: linear-gradient(to bottom, #1b3a1a, #0a140a);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--night-sky);
        }

        /* The Grass Field */
        .field {
            position: absolute;
            bottom: 0; width: 100%; height: 35%;
            background: var(--grass-color);
            z-index: 5;
            cursor: crosshair;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Flower Container */
        .flower-container {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        /* The Stem - Grows first */
        .stem {
            position: absolute;
            bottom: 0; left: -1px;
            width: 3px;
            background: linear-gradient(to top, #132a13, #2d5a27);
            height: 0;
            animation: grow-stem 1.5s ease-out forwards;
            border-radius: 2px;
        }

        @keyframes grow-stem {
            to { height: 80px; }
        }

        /* The Flower Head */
        .flower-head {
            position: absolute;
            top: 0; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            /* Delays bloom until stem is mostly grown */
            animation: bloom-main 2s 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes bloom-main {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        /* Realistic Petals */
        .petal {
            position: absolute;
            width: 20px;
            height: 35px;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
            opacity: 0.9;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* The "Glow" behind the flower */
        .flower-glow {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            filter: blur(20px);
            border-radius: 50%;
            opacity: 0;
            animation: fade-in 2s 1.5s forwards;
        }

        @keyframes fade-in { to { opacity: 0.3; } }

        .center {
            position: absolute;
            background: radial-gradient(circle, #ffeb3b, #fbc02d);
            width: 12px; height: 12px;
            border-radius: 50%;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Fireflies */
        .firefly {
            position: absolute;
            width: 3px; height: 3px;
            background: #e1ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #e1ff00;
            opacity: 0;
            animation: drift 15s linear infinite, flicker 4s ease-in-out infinite;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, -100vh); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="field" id="grassField"></div>

    <script>
        const field = document.getElementById('grassField');

        field.addEventListener('click', (e) => {
            createFlower(e.clientX, e.clientY);
        });

        function createFlower(x, y) {
            const container = document.createElement('div');
            container.className = 'flower-container';
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            const stem = document.createElement('div');
            stem.className = 'stem';

            const head = document.createElement('div');
            head.className = 'flower-head';

            const glow = document.createElement('div');
            glow.className = 'flower-glow';

            // More realistic color palette
            const palettes = [
                {p: '#ff758c', s: '#ff7eb3'}, // Rose
                {p: '#a18cd1', s: '#fbc2eb'}, // Lavender
                {p: '#fad0c4', s: '#ffd1ff'}, // Peach
                {p: '#4facfe', s: '#00f2fe'}  // Bluebell
            ];
            const color = palettes[Math.floor(Math.random() * palettes.length)];
            glow.style.background = color.p;

            // Create 6 overlapping petals
            for (let i = 0; i < 6; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.background = `linear-gradient(to top, ${color.p}, ${color.s})`;
                petal.style.transform = `translate(-50%, -100%) rotate(${i * 60}deg) skewY(10deg)`;
                head.appendChild(petal);
            }

            const center = document.createElement('div');
            center.className = 'center';
            head.appendChild(center);

            head.appendChild(glow);
            stem.appendChild(head);
            container.appendChild(stem);
            document.body.appendChild(container);
        }

        // Generate ambient fireflies
        for (let i = 0; i < 30; i++) {
            const f = document.createElement('div');
            f.className = 'firefly';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.top = Math.random() * 80 + 'vh';
            f.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(f);
        }
    </script>
</body>
</html>
