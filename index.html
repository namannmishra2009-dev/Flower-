<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jhansi's Bioluminescent Garden</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; /* Deep black like the video */
            overflow: hidden;
            touch-action: none;
        }

        /* The Moon */
        .moon {
            position: absolute;
            top: 50px; right: 50px;
            width: 80px; height: 80px;
            background: #fffde0;
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(255, 253, 224, 0.2);
            z-index: 1;
        }
        .moon-text { font-family: 'Georgia', serif; color: #555; font-size: 14px; font-weight: bold; }

        /* Clickable Field */
        .field {
            position: absolute;
            bottom: 0; width: 100%; height: 40%;
            z-index: 100;
            cursor: crosshair;
        }

        /* SVG Flower Styling */
        .flower-svg {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(125, 211, 252, 0.8));
            transform-origin: bottom center;
            animation: gentle-sway 4s ease-in-out infinite;
        }

        @keyframes gentle-sway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        /* Animated Drawing Path */
        .draw-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 3s ease-out forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        /* Bloom Animation */
        .bloom {
            transform: scale(0);
            transform-origin: center;
            animation: scale-up 1.5s 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes scale-up { to { transform: scale(1); } }

        /* Star Dust */
        .dust {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="moon"><div class="moon-text">Jhansi</div></div>
    <div class="field" id="garden"></div>

    <script>
        const garden = document.getElementById('garden');

        function createFlower(x, y) {
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            const height = 200 + Math.random() * 100;
            
            svg.setAttribute("viewBox", `0 0 100 ${height}`);
            svg.setAttribute("width", "120");
            svg.setAttribute("height", height);
            svg.setAttribute("class", "flower-svg");
            svg.style.left = (x - 60) + "px";
            svg.style.top = (y - height + 20) + "px";

            // Main Stem (Curve)
            const stem = document.createElementNS(svgNS, "path");
            const curve = 40 + Math.random() * 20;
            stem.setAttribute("d", `M50,${height} Q${curve},${height/2} 50,40`);
            stem.setAttribute("stroke", "#4facfe");
            stem.setAttribute("stroke-width", "2");
            stem.setAttribute("fill", "none");
            stem.setAttribute("class", "draw-path");
            svg.appendChild(stem);

            // Side Leaves
            for(let i=0; i<3; i++) {
                const leafY = height - (40 + i * 40);
                const side = i % 2 === 0 ? 1 : -1;
                const leaf = document.createElementNS(svgNS, "path");
                leaf.setAttribute("d", `M50,${leafY} C${50+20*side},${leafY-10} ${50+20*side},${leafY-30} 50,${leafY-20}`);
                leaf.setAttribute("fill", "#00f2fe");
                leaf.setAttribute("class", "bloom");
                leaf.style.animationDelay = (1 + i*0.3) + "s";
                svg.appendChild(leaf);
            }

            // The Petals (The Glowy Bloom)
            const bloomG = document.createElementNS(svgNS, "g");
            bloomG.setAttribute("class", "bloom");
            
            for(let i=0; i<6; i++) {
                const p = document.createElementNS(svgNS, "ellipse");
                p.setAttribute("cx", "50"); p.setAttribute("cy", "25");
                p.setAttribute("rx", "8"); p.setAttribute("ry", "15");
                p.setAttribute("fill", "#7dd3fc");
                p.setAttribute("transform", `rotate(${i*60}, 50, 40)`);
                p.style.opacity = "0.9";
                bloomG.appendChild(p);
            }

            // Inner Glow Center
            const center = document.createElementNS(svgNS, "circle");
            center.setAttribute("cx", "50"); center.setAttribute("cy", "40");
            center.setAttribute("r", "4");
            center.setAttribute("fill", "#fff");
            bloomG.appendChild(center);

            svg.appendChild(bloomG);
            document.body.appendChild(svg);
        }

        function handle(e) {
            e.preventDefault();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            createFlower(x, y);
        }

        garden.addEventListener('mousedown', handle);
        garden.addEventListener('touchstart', handle, {passive: false});

        // Add background stars/dust
        for(let i=0; i<80; i++) {
            const d = document.createElement('div');
            d.className = 'dust';
            d.style.width = d.style.height = Math.random() * 2 + 'px';
            d.style.left = Math.random() * 100 + '%';
            d.style.top = Math.random() * 100 + '%';
            document.body.appendChild(d);
        }
    </script>
</body>
</html>
